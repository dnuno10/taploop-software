<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TapLoop</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // Store the full path + query + hash in sessionStorage,
    // then redirect to the root index.html which will restore it.
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
